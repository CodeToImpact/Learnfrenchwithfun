<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning French with Fun 🇫🇷</title>
  <meta name="description" content="A complete A1 French course with embedded verb flashcards, quizzes and grammar patterns — built for daily revision." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <div class="brand">
      <div class="tricolore"><span class="tri-b"></span><span class="tri-w"></span><span class="tri-r"></span></div>
      <div>
        <h1>Learning French with Fun</h1>
        <div class="sub">Daily revision · A1 from scratch</div>
      </div>
    </div>
    <div class="progress-pill">
      <span class="pl">Progress</span>
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <span id="progText">0/9</span>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <input class="side-search" id="sideSearch" type="text" placeholder="🔍 Search a topic, word or verb…" oninput="doSearch()" />
      <div id="navList"></div>
      <div class="search-hint" id="searchHint" style="display:none"></div>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <!-- data first, then renderers, then app controller -->
  <script src="js/course-data.js"></script>
  <script src="js/verbs-data.js"></script>
  <script src="js/course.js"></script>
  <script src="js/verbs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
